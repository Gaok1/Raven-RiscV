[package]
name = "falconasm"
version = "0.1.0"
edition = "2024"

[dependencies]
ratatui = { version = "0.28", features = ["all-widgets"] }
crossterm = "0.29"
thiserror = "1"
comfy-table = "7"

[profile.dev]
incremental = false

[profile.test]
incremental = false

[profile.release]
opt-level = 3        # máxima optmizing
lto = "fat"          # complete LTO  
codegen-units = 1    # better perform
panic = "abort"      # less overhead
debug = false
incremental = false


# Windows / macOS: rfd usa dialogs nativos do OS; arboard usa APIs nativas
[target.'cfg(not(target_os = "linux"))'.dependencies]
rfd     = "0.15"
arboard = "3"

# Linux: rfd usa XDG portal (zbus = pure Rust, sem GTK3, compatível com musl)
#        arboard sem features padrão (sem X11/Wayland obrigatório)
[target.'cfg(target_os = "linux")'.dependencies]
rfd     = { version = "0.15", default-features = false, features = ["xdg-portal", "tokio"] }
arboard = { version = "3",    default-features = false }
