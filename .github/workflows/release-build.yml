name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            kind: windows
            bin: falconasm.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            kind: unix
            bin: falconasm

          - os: macos-latest
            target: x86_64-apple-darwin
            kind: unix
            bin: falconasm

          - os: macos-latest
            target: aarch64-apple-darwin
            kind: unix
            bin: falconasm

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux static toolchain
      - name: Install musl tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # -------------------------
      # Package Windows
      # -------------------------
      - name: Package Windows
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          $bin = "target/${{ matrix.target }}/release/${{ matrix.bin }}"
          Compress-Archive $bin "release-artifacts/falconasm-${{ matrix.target }}.zip"

      # -------------------------
      # Package Unix
      # -------------------------
      - name: Package Unix
        if: matrix.kind != 'windows'
        shell: bash
        run: |
          set -e
          mkdir -p release-artifacts
          BIN="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          tar -czf "release-artifacts/falconasm-${{ matrix.target }}.tar.gz" -C "$(dirname "$BIN")" "$(basename "$BIN")"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-dist
          merge-multiple: true

      - name: Generate SHA256
        run: |
          cd release-dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
