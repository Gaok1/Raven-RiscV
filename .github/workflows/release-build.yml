name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            kind: windows

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            kind: unix

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            kind: unix-cross

          - os: macos-latest
            target: x86_64-apple-darwin
            kind: unix

          - os: macos-latest
            target: aarch64-apple-darwin
            kind: unix

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.kind == 'unix-cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.kind == 'unix-cross'
        run: cross build --release --target "${{ matrix.target }}"

      - name: Build (native)
        if: matrix.kind != 'unix-cross'
        run: cargo build --release --target "${{ matrix.target }}"

      # -------------------------
      # Package (Windows)
      # -------------------------
      - name: Package (Windows zip)
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          $bin = "target/${{ matrix.target }}/release/falconasm.exe"
          if (!(Test-Path $bin)) { throw "Binary not found: $bin" }

          $name = "falconasm-${{ matrix.target }}.zip"
          $tmp  = Join-Path $env:RUNNER_TEMP "pkg"
          New-Item -ItemType Directory -Force $tmp | Out-Null
          Copy-Item $bin (Join-Path $tmp "falconasm.exe") -Force

          $out = Join-Path "release-artifacts" $name
          if (Test-Path $out) { Remove-Item $out -Force }
          Compress-Archive -Path (Join-Path $tmp "*") -DestinationPath $out

      # -------------------------
      # Package (Linux/macOS)
      # -------------------------
      - name: Package (tar.gz)
        if: matrix.kind != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          bin="target/${{ matrix.target }}/release/falconasm"
          test -f "$bin"
          name="falconasm-${{ matrix.target }}.tar.gz"
          tar -czf "release-artifacts/${name}" -C "$(dirname "$bin")" "$(basename "$bin")"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-dist/*