name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_ext: .exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin_ext: ""

          - os: macos-latest
            target: x86_64-apple-darwin
            bin_ext: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            bin_ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact path
        id: prep
        shell: bash
        run: |
          OUT="target/${{ matrix.target }}/release/falconasm${{ matrix.bin_ext }}"
          test -f "$OUT"
          echo "artifact_path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: falconasm-${{ matrix.target }}
          path: ${{ steps.prep.outputs.artifact_path }}
          if-no-files-found: error
          
