name: CI

# Roda em todo push/PR para verificar compilação.
# Em push na main: também empacota e atualiza a release "latest" (rolling).

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────
  # 1. Build (todos os targets, todos os pushes/PRs)
  # ────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: falconasm.exe
            archive: falconasm-windows-x86_64.zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: falconasm
            archive: falconasm-linux-x86_64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            bin: falconasm
            archive: falconasm-macos-x86_64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            bin: falconasm
            archive: falconasm-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl-tools: linker estático para o target linux-musl
      # Não precisa de GTK3 — rfd usa xdg-portal (zbus pure Rust)
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Só empacota quando for push na main (para a release rolling)
      - name: Package (Windows)
        if: github.ref == 'refs/heads/main' && runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.archive }}"

      - name: Package (Unix)
        if: github.ref == 'refs/heads/main' && runner.os != 'Windows'
        run: |
          tar -czf "${{ matrix.archive }}" \
            -C "target/${{ matrix.target }}/release" "${{ matrix.bin }}"

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: dist-${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  # ────────────────────────────────────────────────────────
  # 2. Rolling release "latest" (só em push na main)
  # ────────────────────────────────────────────────────────
  rolling-release:
    name: Update rolling release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: SHA256 checksums
        run: cd dist && sha256sum * > SHA256SUMS.txt

      # Remove a release "latest" anterior (tag + assets) para recriar limpa
      - name: Remove old "latest" release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: true
          make_latest: false
          files: dist/*
          body: |
            Automated build from [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            > ${{ github.event.head_commit.message }}

            | Platform | Arquivo |
            |---|---|
            | Windows x64 | `falconasm-windows-x86_64.zip` |
            | Linux x64 (musl estático) | `falconasm-linux-x86_64.tar.gz` |
            | macOS x64 | `falconasm-macos-x86_64.tar.gz` |
            | macOS ARM64 (Apple Silicon) | `falconasm-macos-aarch64.tar.gz` |

            SHA256 de todos os arquivos em `SHA256SUMS.txt`.
