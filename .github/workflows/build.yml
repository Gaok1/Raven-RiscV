name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_ext: .exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_ext: ""

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin_ext: ""

          - os: macos-latest
            target: x86_64-apple-darwin
            bin_ext: ""

          - os: macos-latest
            target: aarch64-apple-darwin
            bin_ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (only for Linux aarch64)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (Linux aarch64 via cross)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact path
        id: prep
        shell: bash
        run: |
          OUT="target/${{ matrix.target }}/release/falconasm${{ matrix.bin_ext }}"
          test -f "$OUT"
          echo "artifact_path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (binary)
        uses: actions/upload-artifact@v4
        with:
          name: falconasm-${{ matrix.target }}
          path: ${{ steps.prep.outputs.artifact_path }}
          if-no-files-found: error
          